# clawgateway SSH hardening — see docs/security/clawgateway-security-review.md
#
# NAME MATTERS: sshd uses the FIRST value seen for most keywords, and Include
# pulls sshd_config.d/*.conf in lexical order. This file is prefixed `00-` so it
# is read BEFORE cloud-init's `50-cloud-init.conf` (and before the main config
# body), guaranteeing these values win. harden.sh also deletes the cloud-init
# drop-in, but this ordering is the belt-and-suspenders that makes it correct.

# H5: no root SSH at all (was `without-password`).
PermitRootLogin no

# C1: key-only. No passwords, no keyboard-interactive.
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
AuthenticationMethods publickey
PermitEmptyPasswords no

# L4: only members of the sudo group (i.e. clawtilla) may log in.
AllowGroups sudo

# Headless NAT gateway — no forwarding/tunnelling/X11 surface (L2).
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no
PermitTunnel no
GatewayPorts no

# Tighter auth/idle limits (M2, L5).
MaxAuthTries 3
LoginGraceTime 30
ClientAliveInterval 300
ClientAliveCountMax 2

# Modern crypto only: drop hmac-sha1 and small RSA (M2).
RequiredRSASize 3072
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org
